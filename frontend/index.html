<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Prexario" />
    <meta name="theme-color" content="#C9A84C" />
    <link rel="manifest" href="/manifest.json" />

    <!-- SEO base -->
    <title>Prexario — Calculadora de precios desde Google Sheets</title>
    <meta
      name="description"
      content="Convierte tu hoja de cálculo de Google en una calculadora de precios compartible al instante. Sin código. Ideal para autónomos y empresas en España."
    />
    <meta
      name="robots"
      content="index, follow, max-snippet:150, max-image-preview:large"
    />
    <meta name="author" content="Prexario" />

    <!-- Geo targeting Spain -->
    <meta name="geo.region" content="ES" />
    <meta name="geo.placename" content="España" />
    <meta name="language" content="Spanish" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="Prexario" />
    <meta
      property="og:title"
      content="Prexario — Calculadora de precios desde Google Sheets"
    />
    <meta
      property="og:description"
      content="Convierte tu hoja de cálculo de Google en una calculadora de precios compartible al instante. Sin código. Ideal para autónomos y empresas en España."
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Prexario — Calculadora de precios desde Google Sheets"
    />
    <meta
      name="twitter:description"
      content="Convierte tu hoja de cálculo de Google en una calculadora de precios compartible al instante. Sin código."
    />

    <!-- Hreflang -->
    <link rel="alternate" hreflang="es" href="https://prexario.dpdns.org/" />
    <link rel="alternate" hreflang="es-ES" href="https://prexario.dpdns.org/" />
    <link
      rel="alternate"
      hreflang="x-default"
      href="https://prexario.dpdns.org/"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

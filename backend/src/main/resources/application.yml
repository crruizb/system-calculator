spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/systemcalculator}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${PREX_GOOGLE_CLIENT_ID}
            client-secret: ${PREX_GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
            redirect-uri: ${PREX_BACKEND_BASE_URL:http://localhost:8080}/login/oauth2/code/google

app:
  jwt:
    secret: ${PREX_JWT_SECRET:change-me-to-a-256-bit-secret-in-production}
    expiration-ms: 900000
    refresh-expiration-ms: 2592000000
  frontend-url: ${PREX_FRONTEND_URL:http://localhost:5173}
  backend-url: ${PREX_BACKEND_BASE_URL:http://localhost:8080}
  resend:
    api-key: ${PREX_RESEND_API_KEY}
    from-email: ${PREX_RESEND_FROM_EMAIL}
  stripe:
    secret-key: ${PREX_STRIPE_SECRET_KEY}
    webhook-secret: ${PREX_STRIPE_WEBHOOK_SECRET}
    basic-price-id: ${PREX_STRIPE_BASIC_PRICE_ID}
    pro-price-id: ${PREX_STRIPE_PRO_PRICE_ID}
    success-url: ${PREX_APP_BASE_URL}/dashboard/billing?success=true
    cancel-url: ${PREX_APP_BASE_URL}/dashboard/billing

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test --no-daemon
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

  docker:
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Get current date
        run: echo "IMAGE_TAG=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        working-directory: backend
        run: |
          docker build -t prexario:$IMAGE_TAG .
          docker tag prexario:$IMAGE_TAG ${{ secrets.DOCKERHUB_USERNAME }}/prexario:$IMAGE_TAG
          docker tag prexario:$IMAGE_TAG ${{ secrets.DOCKERHUB_USERNAME }}/prexario:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/prexario:$IMAGE_TAG
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/prexario:latest
